services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supavault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supavault"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/supavault
      - LOCAL_STORAGE_DIR=/data
      - APP_URL=http://localhost:3000
    volumes:
      - supavault-data:/data
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build:
      context: ./mcp
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/supavault
      - LOCAL_STORAGE_DIR=/data
      - APP_URL=http://localhost:3000
      - API_URL=http://api:8000
      - MCP_URL=http://localhost:8080/mcp
    volumes:
      - supavault-data:/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MCP_URL=http://localhost:8080/mcp
    depends_on:
      - api

volumes:
  pgdata:
  supavault-data:
